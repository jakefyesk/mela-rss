# mela-rss source roster.
#
# Adding a source is normally just an entry here (no code) unless it needs a
# bespoke discovery hook (instagram, chef_page).
#
#   mode:      link_through  -> feed item points at the source's own page
#              rehost         -> we render our own JSON-LD page and point at it
#   discovery: sitemap | native_feed | chef_page | instagram
#
# NOTE: feed/sitemap URLs marked "verify" could not be confirmed from the build
# sandbox (egress blocked). The build logs-and-skips a source that 404s/403s, so
# an occasional wrong URL degrades gracefully — fix it once CI surfaces it.

defaults:
  category: recipe
  enabled: true
  max_new_per_run: 20
  request_delay_seconds: 2.0

sources:
  # --- MINDLINK (recipes you saved via your MindLink hub) ----------------
  # Pulls everything MindLink classified as a `recipe` and rehosts it, tagged
  # so you can tell — in the feed and inside Mela — that you saved it via
  # MindLink. Configured entirely via env (no secrets in this file):
  #   MINDLINK_API_URL  e.g. https://mind-link.vercel.app   (repo Variable)
  #   MINDLINK_TOKEN    a MindLink API token with `read` scope (repo Secret)
  # Unconfigured (either missing) => a graceful no-op, so the build still runs.
  - name: mindlink
    mode: rehost
    discovery: mindlink
    display_name: "MindLink"
    rehost_author: ""        # authorship comes from each item's metadata

  # --- PRIMARY TARGETS ---------------------------------------------------
  - name: finntonry
    mode: rehost           # Instagram has no recipe page for Mela to read
    discovery: instagram
    seed_file: "sources/finntonry_posts.txt"
    rehost_author: "Finn Tonry"

  - name: joshuaweissman
    mode: rehost           # his site has no usable JSON-LD -> we re-emit clean JSON-LD
    # His SPA sitemap doesn't list recipes, but the /recipes + category index
    # pages link to them (anchors + embedded JSON). url_pattern keeps only
    # individual recipe pages (not the index/category pages themselves).
    discovery: index_page
    url: "https://www.joshuaweissman.com/recipes"
    index_urls:
      - "https://www.joshuaweissman.com/categories/main-dishes"
      - "https://www.joshuaweissman.com/categories/breakfast"
      - "https://www.joshuaweissman.com/categories/baking-desserts"
      - "https://www.joshuaweissman.com/categories/snacks-sides"
      - "https://www.joshuaweissman.com/categories/sandwiches-burgers"
    url_pattern: "joshuaweissman\\.com/recipes/[a-z0-9-]+$"
    scraper_host: joshuaweissman.com
    rehost_author: "Joshua Weissman"
    backfill_limit: 300
    max_new_per_run: 15

  # --- LINK-THROUGH CREATORS (clean JSON-LD; Mela extracts natively) -----
  - name: ethanchlebowski
    mode: link_through
    discovery: native_feed
    # Squarespace collection RSS = <collection-url>?format=rss; his recipes live
    # at /cooking-techniques-recipes (confirmed via search).
    feed_url: "https://www.ethanchlebowski.com/cooking-techniques-recipes?format=rss"
    scraper_host: ethanchlebowski.com

  - name: andycooks
    mode: link_through
    discovery: sitemap
    sitemap: "https://www.andy-cooks.com/sitemap.xml"            # verify
    url_pattern: "andy-cooks\\.com/.+/.+"
    scraper_host: andy-cooks.com

  - name: justinesnacks
    mode: link_through
    discovery: native_feed
    feed_url: "https://www.justinesnacks.com/feed/"              # verify (WordPress)
    scraper_host: justinesnacks.com

  - name: jamieoliver
    mode: link_through
    discovery: sitemap
    sitemap: "https://www.jamieoliver.com/sitemap.xml"           # verify
    url_pattern: "jamieoliver\\.com/recipes/.+"
    scraper_host: jamieoliver.com

  # --- OPTIONAL: reliable finntonry backbone via Mob (clean JSON-LD) -----
  # Enable if Instagram captions get thin/unreliable. Covers his Mob-published
  # recipes only (a subset of his output).
  - name: finntonry-mob
    mode: link_through
    discovery: chef_page
    url: "https://www.mob.co.uk/chefs/finn-tonry"                # verify (Cloudflare)
    url_pattern: "mob\\.co\\.uk/recipes/"
    scraper_host: mob.co.uk
    enabled: false

  # --- COCKTAILS (category: cocktail -> cocktails.xml) -------------------
  # All Instagram-first (creators + bars), so all rehost via curated caption
  # seed lists — the same free pipeline as finntonry. Paste an Instagram caption
  # into each source's seed_file to publish it; these route to cocktails.xml,
  # kept separate from the recipe feed. Several have websites that could later
  # become link_through native_feed sources (noted inline) if reliably fetchable.
  - name: moresavorygoods
    mode: rehost
    discovery: instagram
    category: cocktail
    display_name: "More Savory Goods"
    seed_file: "sources/moresavorygoods_posts.txt"
    rehost_author: "More Savory Goods"          # @moresavorygoods (Lance Wong)

  - name: kevinkos
    mode: rehost
    discovery: instagram
    category: cocktail
    display_name: "Kevin Kos"
    seed_file: "sources/kevinkos_posts.txt"
    rehost_author: "Kevin Kos"                  # @kevin_kos
    # kevinkos.com (Wix) has /recipes + /post/<slug> and likely /blog-feed.xml —
    # a native_feed candidate once fetchable.

  - name: jfdesfosses
    mode: rehost
    discovery: instagram
    category: cocktail
    display_name: "Jean-Félix Desfossés"
    seed_file: "sources/jfdesfosses_posts.txt"
    rehost_author: "Jean-Félix Desfossés"       # @jfdesfosses
    # trufflesontherocks.com is a WordPress cocktail blog (likely /feed/) — a
    # strong native_feed candidate once past its Cloudflare bot-block.

  - name: cocktailcamera
    mode: rehost
    discovery: instagram
    category: cocktail
    display_name: "Jordan Hughes (Cocktail Camera)"
    seed_file: "sources/cocktailcamera_posts.txt"
    rehost_author: "Jordan Hughes"              # @cocktailcamera

  - name: verygooddrinks
    mode: rehost
    discovery: instagram
    category: cocktail
    display_name: "Very Good Drinks"
    seed_file: "sources/verygooddrinks_posts.txt"
    rehost_author: "Very Good Drinks"           # @verygooddrinks

  - name: drinksbyevie
    mode: rehost
    discovery: instagram
    category: cocktail
    display_name: "Drinks by Evie"
    seed_file: "sources/drinksbyevie_posts.txt"
    rehost_author: "Drinks by Evie"             # @drinksbyevie

  - name: mother-cocktail-bar
    mode: rehost
    discovery: instagram
    category: cocktail
    display_name: "Mother Cocktail Bar"
    seed_file: "sources/mother_cocktail_bar_posts.txt"
    rehost_author: "Mother Cocktail Bar"        # @mothercocktailbar (Toronto)

  - name: pch-sf
    mode: rehost
    discovery: instagram
    category: cocktail
    display_name: "PCH — Pacific Cocktail Haven"
    seed_file: "sources/pch_sf_posts.txt"
    rehost_author: "Pacific Cocktail Haven"     # @pch_sf (San Francisco)

  - name: amourdrink
    mode: rehost
    discovery: instagram
    category: cocktail
    display_name: "Amour Drink"
    seed_file: "sources/amourdrink_posts.txt"
    rehost_author: "Amour Drink"                # @amourdrink.tv
    # Substack amourdrink.substack.com likely exposes /feed (RSS) — a native_feed
    # candidate for written recipe posts if fetchable.
