name: build-feeds

on:
  schedule:
    - cron: "0 */6 * * *"        # every 6 hours
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run full backfill (ignore max_new_per_run) + write bundles"
        type: boolean
        default: false
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "sources.yaml"
      - "sources/**"
      - ".github/workflows/build.yml"

permissions:
  contents: write        # commit generated docs/ + catalog
  pages: write
  id-token: write

concurrency:
  group: build-feeds-${{ github.ref }}
  cancel-in-progress: false     # never interrupt a run mid-commit

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Build feeds, pages, catalog
        env:
          BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          BACKFILL: ${{ github.event.inputs.backfill }}
          IG_OEMBED_TOKEN: ${{ secrets.IG_OEMBED_TOKEN }}   # optional
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then ARGS="--backfill"; fi
          PYTHONPATH=src python -m melarss.build --base-url "$BASE_URL" $ARGS

      - name: Commit generated output
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name  "mela-rss-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data/catalog.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "chore: refresh feeds ($(date -u +%FT%TZ))"
          # Clustered runs (a push that touches trigger paths + the 6-hourly cron,
          # etc.) each check out their own trigger SHA, so a run that finishes late
          # pushes a commit built on a now-stale tip and gets rejected as
          # non-fast-forward. Rebase our single regenerated commit onto the latest
          # branch tip and retry. Generated output is deterministic and re-emitted
          # every run, so prefer our fresh build on any conflicting hunk.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:$BRANCH"; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected (attempt $attempt); rebasing onto origin/$BRANCH"
            git fetch origin "$BRANCH"
            git rebase -X theirs "origin/$BRANCH" || { git rebase --abort || true; exit 1; }
          done
          echo "push still failing after retries" >&2
          exit 1

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only deploy from the primary branch; feature-branch runs still build+commit.
    # `schedule` runs (the 6-hourly cron) fire only on the default branch, but the
    # scheduled event payload carries no repository.default_branch, so the ref
    # comparison alone would evaluate false and silently skip publishing. Allow
    # scheduled runs explicitly so the site actually republishes on cron.
    if: >-
      github.event_name == 'schedule'
      || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Optional token used only to auto-enable Pages (see step below). Mapped to
      # an env var so it can be tested in a step `if:`. Leave the secret unset if
      # you enable Pages by hand instead.
      PAGES_ENABLE_TOKEN: ${{ secrets.PAGES_ENABLE_TOKEN }}
    steps:
      # deploy-pages needs a Pages site with Source = "GitHub Actions" to exist;
      # otherwise it fails with "Failed to create deployment (status: 404) ...
      # Ensure GitHub Pages has been enabled". The built-in GITHUB_TOKEN is NOT
      # permitted to create that site. This step enables it automatically when a
      # PAGES_ENABLE_TOKEN secret is present -- a classic PAT with `repo` scope,
      # or a fine-grained PAT with Administration:write + Pages:write on this repo.
      # If the secret is absent the step is skipped and Pages must be enabled once
      # via repo Settings -> Pages -> Source: "GitHub Actions".
      - name: Ensure Pages is enabled (Source = GitHub Actions)
        if: env.PAGES_ENABLE_TOKEN != ''
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.PAGES_ENABLE_TOKEN }}
      - id: deployment
        uses: actions/deploy-pages@v4
